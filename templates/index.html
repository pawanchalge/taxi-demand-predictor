<!DOCTYPE html>
<html>
<head>
    <title>Taxi Demand Predictor</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white;
            text-align: center;
            padding-top: 50px;
        }

        .container {
            background: white;
            color: black;
            width: 350px;
            margin: auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.3);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            background: #2a5298;
            color: white;
            padding: 12px;
            border: none;
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #1e3c72;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            color: green;
        }
    </style>
</head>

<body>

    <h1>🚖 Taxi Demand Prediction</h1>

    <div class="container">
        <form action="/predict" method="post">
            <input type="number" name="location" placeholder="📍 Location ID" required>
            <input type="number" name="hour" placeholder="⏰ Hour (0-23)" required>
            <input type="number" name="day" placeholder="📅 Day (0-6)" required>

            <button type="submit">🚀 Predict Demand</button>
        </form>

        {% if prediction %}
            <div class="result">
                {{ prediction }}
            </div>
        {% endif %}
    </div>

</body>
</html>
